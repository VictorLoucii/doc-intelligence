<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>N-ERGY Document Intelligence</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>N-ERGY Document Intelligence System</h1>

  <section>
    <h2>Upload PDFs</h2>
    <form id="upload-form">
      <input type="file" name="files" multiple accept="application/pdf">
      <button type="submit">Upload</button>
    </form>
    <div id="upload-results"></div>
  </section>

  <section>
    <h2>Ask a Question</h2>
    <form id="query-form">
      <input type="text" id="question" name="question" placeholder="Ask a question about the uploaded documents" size="60">
      <button type="submit">Ask</button>
    </form>
    <div id="query-error"></div>
    <div id="answer"></div>
    <div id="citations"></div>
  </section>

  <section>
    <h2>Cross-Document Insights</h2>
    <button id="insights-btn">Get Insights</button>
    <div id="insights-error"></div>
    <div id="insights-results"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
